services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hrm-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - hrm-sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -No -Q \"SELECT 1\""]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 5s

  api:
    build:
      context: .
      dockerfile: HRM.API/Dockerfile
    container_name: hrm-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db;Database=HRManagementSystem;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__ExpiryMinutes: "${JWT_EXPIRY_MINUTES}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hrm-sqldata:
